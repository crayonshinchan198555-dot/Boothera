<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="signup-container">
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <h1 class="title">SIGN UP</h1>

        <!-- 1. 💡 在这里加上了 action="signup.php" 和 method="POST" -->
        <form id="signupForm" action="../../signup.php" method="POST" novalidate>
            
            <div class="form-group">
                <label for="name">Name</label>
                <!-- 2. 💡 加上了 name="name" -->
                <input type="text" id="name" name="name" required placeholder="Enter your name">
                <span class="error-msg">Name is required</span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <!-- 3. 💡 加上了 name="phone_number" -->
                <input type="tel" id="phone" name="phone_number" required placeholder="O1X-XXXX XXXX">
                <span class="error-msg">Please enter a valid phone number</span>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <!-- 4. 💡 加上了 name="email" -->
                <input type="email" id="email" name="email" required placeholder="abc @gmail.com">
                <span class="error-msg">Please enter a valid email address</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <!-- 5. 💡 加上了 name="password" -->
                    <input type="password" id="password" name="password" required placeholder="************">
                    <i class="far fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                </div>
                <span class="error-msg">Password must be at least 6 characters long</span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <!-- 6. 💡 加上了 name="confirm_password" -->
                    <input type="password" id="confirmPassword" name="confirm_password" required placeholder="************">
                    <i class="far fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
                <span class="error-msg" id="confirmError">Passwords do not match</span>
            </div>

            <div class="form-group">
                <label for="businessName">Business Name</label>
                <!-- 7. 💡 加上了 name="business_name" -->
                <input type="text" id="businessName" name="business_name" required placeholder="Enter business name">
                <span class="error-msg">Business name is required</span>
            </div>

            <div class="terms-group">
                <label class="checkbox-container">
                    <!-- 8. 💡 加上了 name="terms" -->
                    <input type="checkbox" id="terms" name="terms" required>
                    <span class="checkmark"></span>
                    <span class="terms-text">Read carefully for <a href="#">terms & conditions</a> apply</span>
                </label>
                <div class="error-msg-terms">You must agree to the terms and conditions to register</div>
            </div>

            <button type="submit" class="register-btn">REGISTER</button>
        </form>

        <div class="home-indicator"></div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
