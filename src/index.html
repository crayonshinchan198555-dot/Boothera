<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boothera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- animation -->
<div id="splash-screen">
        
        <img class="bamboo-bg" src="./images/bamboo.png" alt="Bamboo Background">

        <div class="animation-stage">
            
            <div class="slogan">
                <span class="indent-1">Your</span>
                <span class="indent-2">Space,</span>
                <span class="indent-3">Your</span>
                <span class="indent-4">stage.</span>
            </div>

            <img class="logo-mountain" src="./images/logo.png" alt="Mountain Logo">

            <div class="brand-text">BOOTHERA</div>

        </div>
</div>

<!-- login page -->
<div class="container">

    <h1 class="title">Welcome To Boothera!</h1>

    <!-- 1. 把这里的 <div> 改成 <form>，并加上 action 和 method -->
    <form class="form-box" action="login.php" method="POST">

        <h2>SIGN IN</h2>
        <p>E-mail</p>

        <!-- 2. 加上了 name="email" 和 required（必填） -->
        <input type="email" id="login-email" name="email" placeholder="Email" required>
        
        <div class="password-box">
            <p>Password</p>

            <div class="password-input">
                <!-- 3. 加上了 name="password" 和 required -->
                <input type="password" id="password" name="password" placeholder="Password" required>
                <span onclick="togglePassword()" style="cursor:pointer;"></span>
            </div>
        </div>

        <p class="forgot" onclick="openForgotModal()">Forgot password?</p>

        <div class="terms-box">
            <!-- 4. 加上了 required，用户必须勾选才能登录 -->
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to Terms & Conditions</label>
        </div>

        <!-- 5. 把 button 的 type 改为 submit，并删掉了 onclick="login()" -->
        <button type="submit" class="btn">LOGIN</button>

        <p class="signup-text">
            New user? <a href="signup_pages/signup.html">Create account</a>
        </p>

    <!-- 6. 记得这里也要改成 </form> -->
    </form>

</div>

<!-- forgot password -->
<div class="modal" id="forgotModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeForgotModal()">&times;</span>
        <h3>Reset Password</h3>
        
        <p>Your Email</p>
        <input type="email" id="reset-email" placeholder="Enter your email">
        
        <p>Verification Code</p>
        <div class="code-box">
            <input type="text" id="reset-code" placeholder="6-digit code">
            <button class="send-btn" id="sendBtn" onclick="sendCode()">Get Code</button>
        </div>

        <p>New Password</p>
        <input type="password" id="new-password" placeholder="Enter new password">
        
        <button class="btn reset-submit-btn" onclick="submitNewPassword()">Reset Password</button>
    </div>
</div>

<!-- 1. 保留你原本的外部 script 引入 -->
<script src="script.js?v=123"></script>

<!-- 2. 👇 在下面直接塞入这段新的脚本，强行覆盖掉 script.js 里的同名函数 -->
<!-- 在你原有的脚本下面，补上/替换成这段拦截登录的脚本 -->
<script>
// ==================== 🚀 1. 拦截登录表单（带 Debug 增强版） ====================
// ==================== 🚀 拦截登录表单并分流跳转 ====================
document.querySelector('.form-box').addEventListener('submit', function(event) {
    event.preventDefault(); 
    console.log("【Debug】表单提交已成功拦截！");

    const emailInput = document.getElementById('login-email').value.trim();
    const passwordInput = document.getElementById('password').value;

    fetch('login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `email=${encodeURIComponent(emailInput)}&password=${encodeURIComponent(passwordInput)}`
    })
    .then(response => response.json()) // 此时后端返回的是纯正 JSON 了，这里绝对不会再报错 '<' 了！
    .then(data => {
        console.log("【Debug】从 login.php 接收到的原始数据:", data);

        if (data.success) {
            // 🔑 存入通关凭证
            localStorage.setItem("userEmail", emailInput);
            localStorage.setItem("isLoggedIn", "true");
            console.log("【Debug】缓存存储完毕。");

            // 🔀 根据后端给的 role 进行分流跳转
            if (data.role === 'admin') {
                alert("🎉 Login Successful! (Admin)");
                window.location.href = "adminpages/home.html"; 
            } else {
                alert("🎉 Login Successful! (User)");
                window.location.href = "user_pages/user.html"; 
            }
        } else {
            alert(data.message || "登录失败，请重试！");
        }
    })
    .catch(error => {
        console.error('【🚨 Debug 错误】', error);
        alert('登录连接错误，请检查网络或刷新页面！');
    });
});


// ==================== 2. 忘记密码逻辑 ====================
function sendCode() {
    const email = document.getElementById('reset-email').value.trim();
    if (!email) { 
        alert('Please enter your email first!'); 
        return; 
    }

    fetch('forgot_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `action=send_code&email=${encodeURIComponent(email)}`
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(`[⚠️ 测试模式 - 验证码拦截成功]\n\n您的 6 位验证码是：${data.code}\n\n(请复制该数字填入表单)`);
        } else {
            alert(data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('连接失败，请检查网络或 php 文件！');
    });
}

function submitNewPassword() {
    const email = document.getElementById('reset-email').value.trim();
    const code = document.getElementById('reset-code').value.trim();
    const password = document.getElementById('new-password').value.trim();

    if (!email || !code || !password) { 
        alert('Please fill in all fields!'); 
        return; 
    }

    fetch('forgot_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `action=reset_password&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}&password=${encodeURIComponent(password)}`
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
        if (data.success) {
            closeForgotModal(); 
            document.getElementById('reset-email').value = '';
            document.getElementById('reset-code').value = '';
            document.getElementById('new-password').value = '';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('重置请求失败，请重试！');
    });
}
</script>
</body>
</html>
