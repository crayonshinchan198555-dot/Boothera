<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boothera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="splash-screen">
        
        <img class="bamboo-bg" src="./images/bamboo.png" alt="Bamboo Background">

        <div class="animation-stage">
            
            <div class="slogan">
                <span class="indent-1">Your</span>
                <span class="indent-2">Space,</span>
                <span class="indent-3">Your</span>
                <span class="indent-4">stage.</span>
            </div>

            <img class="logo-mountain" src="./images/logo.png" alt="Mountain Logo">

            <div class="brand-text">BOOTHERA</div>

        </div>
</div>

<div class="container">

    <h1 class="title">Welcome To Boothera!</h1>

    <div class="form-box">

        <h2>SIGN IN</h2>
        <p>E-mail</p>

        <input type="email" placeholder="Email">
        
        <div class="password-box">
            <p>Password</p>

        <div class="password-input">
            <input type="password" id="password" placeholder="Password">
            <span onclick="togglePassword()" style="cursor:pointer;"></span>
        </div>
        </div>

        <p class="forgot">Forgot password?</p>

        <div class="terms-box">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to Terms & Conditions</label>
        </div>

        <button class="btn" onclick="login()">LOGIN</button>

        <p class="signup-text">
            New user? <a href="signup.html">Create account</a>
        </p>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
