<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boothera - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="title">Welcome To Boothera!</h1>

    <div class="form-box">

        <h2>SIGN IN</h2>
        <p>E-mail</p>

        <input type="email" placeholder="Email">
        
        <div class="password-box">
            <p>Password</p>

        <div class="password-input">
            <input type="password" id="password" placeholder="Password">
            <span onclick="togglePassword()" style="cursor:pointer;"></span>
        </div>
        </div>

        <p class="forgot">Forgot password?</p>

        <div class="terms-box">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to Terms & Conditions</label>
        </div>

        <button class="btn" onclick="login()">LOGIN</button>

        <p class="signup-text">
            New user? <a href="signup.html">Create account</a>
        </p>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
